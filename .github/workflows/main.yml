name: Fetch TASE OTC Data Daily

on:
  schedule:
    # שעון גיטהאב הוא UTC. ישראל כרגע ב-UTC+3 (שעון קיץ).
    # השעה 11:00 בישראל = 08:00 ב-UTC
    - cron: '0 8 * * 0-4'
    # השעה 17:00 בישראל = 14:00 ב-UTC
    - cron: '13 14 * * 0-4'
  workflow_dispatch: # כפתור קסם שמאפשר לנו להפעיל ידנית כדי לבדוק

permissions:
  contents: write

jobs:
  fetch-and-save:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Fetch OTC Script
        env:
          # משיכת הסוד מהכספת לתוך השרת
          TASE_API_KEY: ${{ secrets.TASE_API_KEY }}
        run: python "Fetch_OTC - Automate.py"

      - name: Commit and Push new JSON
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-fetch OTC data"
          git push
